{{ define "main" }}
<div id="default-single-view" class="pt-28 pb-20 min-h-screen">
  <div class="max-w-[860px] mx-auto px-6">
    <a
      href="/products"
      class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-brand mb-6 transition-colors"
    >
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M19 12H5M12 5l-7 7 7 7" />
      </svg>
      Back to Products
    </a>
    <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">{{ .Title }}</h1>
    <div
      class="prose prose-invert prose-slate max-w-none text-slate-300 leading-relaxed"
    >
      {{ .Content }}
    </div>
  </div>
</div>
{{ end }}
