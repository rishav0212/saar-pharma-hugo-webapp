{{ define "main" }}
<section id="error-404" class="section section--abyss min-h-[90vh] flex items-center justify-center text-center">
  <div class="container relative z-10">
    <div class="404-visual mb-12" data-animate>
      <div class="glitch-text text-[clamp(80px,15vw,160px)] font-display font-extrabold text-white/5 leading-none select-none">404</div>
      <div class="text-brand-2 font-display font-extrabold text-2xl -mt-10 md:-mt-16 relative z-10 tracking-tight">Resource Unavailable</div>
    </div>
    
    <div class="max-w-[620px] mx-auto" data-animate data-delay="0.2">
      <h1 class="section-title text-white">System Error: Page Not Found</h1>
      <p class="section-kicker text-white/70 mt-6 text-lg leading-relaxed">
        The pharmaceutical manufacturing record or page you are looking for has been moved, archived, or does not exist in our current production database.
      </p>
      
      <div class="flex flex-wrap justify-center gap-5 mt-12">
        <a href="/" class="btn btn--primary px-8">
          Return to Homepage
          <i data-lucide="home" class="icon--sm" aria-hidden="true"></i>
        </a>
        <a href="/products/" class="btn btn--ghost px-8">
          Browse Products
          <i data-lucide="beaker" class="icon--sm" aria-hidden="true"></i>
        </a>
      </div>
    </div>
  </div>
</section>
{{ end }}
