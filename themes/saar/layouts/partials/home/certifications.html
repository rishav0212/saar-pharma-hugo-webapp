<section class="section section--deep-soft section-rail" id="certifications" aria-labelledby="certifications-title">
  <div class="container">
    <div class="cert-layout">
      <div class="cert-copy" data-animate data-animate-type="scale-in">
        <span class="eyebrow">Quality confidence</span>
        <h2 id="certifications-title" class="section-title section-title--sm">Our Certifications</h2>
        <p class="section-kicker mt-5">
          Saar Biotech maintains the highest regulatory standards, ensuring every batch meets international quality and safety benchmarks.
        </p>
      </div>
      <div class="cert-badges" data-animate data-animate-stagger>
        {{ range $index, $item := .items }}
        <a href="{{ $item.link | default "#" }}" class="cert-badge" {{ if $item.link }}target="_blank" rel="noopener noreferrer"{{ end }}>
          <div class="cert-badge__icon">
            {{ if $item.logo }}
              <!-- Logo placeholder - will fallback to icon if image not found -->
              <img src="{{ $item.logo }}" alt="{{ $item.title }}" class="icon icon--md" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid'">
              <div class="icon-fallback" style="display:none;">
                <i data-lucide="{{ $item.icon }}" class="icon icon--md" aria-hidden="true"></i>
              </div>
            {{ else }}
              <i data-lucide="{{ $item.icon }}" class="icon icon--md" aria-hidden="true"></i>
            {{ end }}
          </div>
          <div class="cert-badge__body">
            <strong>{{ $item.title }}</strong>
            <span>{{ $item.text }}</span>
          </div>
          <div class="cert-badge__arrow">
            <i data-lucide="external-link" class="icon icon--xs"></i>
          </div>
        </a>
        {{ end }}
      </div>
    </div>
  </div>
</section>
