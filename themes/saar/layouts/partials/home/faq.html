<section class="section section--paper section-rail" id="faq" aria-labelledby="faq-title">
  <div class="container faq-accordion">
    <div class="faq-accordion__aside" data-animate data-animate-type="slide-right">
      <span class="eyebrow">Common questions</span>
      <h2 id="faq-title" class="section-title section-title--sm">Before you send a manufacturing brief</h2>
      <p class="section-kicker">Quick answers on product range, private label support, facility location, and quotation details.</p>
      <a class="btn btn--outline" href="#contact">
        Start Enquiry
        <i data-lucide="arrow-right" class="icon" aria-hidden="true"></i>
      </a>
    </div>
    <div class="faq-accordion__list" data-animate data-animate-stagger>
      {{ range $index, $item := .items }}
      <div class="faq-accordion__item{{ if eq $index 0 }} is-active{{ end }}" id="faq-{{ $item.q | urlize }}">
        <div class="faq-accordion__header">
          <span>{{ $item.q }}</span>
        </div>
        <div class="faq-accordion__answer">
          <div class="faq-accordion__inner">
            <div class="faq-accordion__content">
              <p>{{ $item.a }}</p>
            </div>
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
