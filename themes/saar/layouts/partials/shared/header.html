<header id="site-header" class="site-header" role="banner">
  <div class="site-header__inner">
    <a class="brand" href="/" aria-label="Saar Biotech home">
      <div class="brand-logo">
        {{ partial "shared/logo-svg.html" . }}
      </div>
      <span class="brand__text max-md:hidden">
        <span class="brand__name">Saar Biotech Pvt. Ltd.</span>
        <span class="brand__meta">Leading Pharma Contract Manufacturer</span>
      </span>
    </a>

    <nav id="site-navigation" class="site-nav" aria-label="Main navigation">
      <a href="/about/" class="{{ if eq .RelPermalink "/about/" }}active{{ end }}">About</a>
      <a href="/products/categories/" class="{{ if eq .RelPermalink "/products/categories/" }}active{{ end }}">Categories</a>
      <a href="/products/" class="{{ if and (or (eq .Section "products") (eq .Section "product")) (ne .RelPermalink "/products/categories/") }}active{{ end }}">Products</a>
      <a href="/manufacturing-unit/" class="{{ if eq .RelPermalink "/manufacturing-unit/" }}active{{ end }}">Manufacturing</a>
      <a href="/contact/" class="{{ if eq .RelPermalink "/contact/" }}active{{ end }}">Contact Us</a>
      <a href="/articles/" class="{{ if or (eq .RelPermalink "/articles/") (eq .Section "articles") }}active{{ end }}">Articles</a>
    </nav>

    <div id="header-actions" class="header-actions">
      <button id="search-toggle" class="header-action-btn" type="button" aria-label="Open Search">
        <i data-lucide="search" class="icon" aria-hidden="true"></i>
      </button>
      <a class="header-call" href="tel:{{ .Site.Params.phone | urlize }}">
        <i data-lucide="phone-call" class="icon" aria-hidden="true"></i>
        {{ .Site.Params.phone }}
      </a>
      <a class="btn btn--primary btn--small" href="#" data-enquire-trigger>
        <span class="max-sm:hidden">Enquire Now</span>
        <i data-lucide="send" class="icon" aria-hidden="true"></i>
      </a>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"
        aria-controls="mobile-nav">
        <i data-lucide="menu" class="icon icon-menu" aria-hidden="true"></i>
        <i data-lucide="x" class="icon icon-close" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile navigation">
    <a href="/" class="{{ if .IsHome }}active{{ end }}">Home</a>
    <a href="/about/" class="{{ if eq .RelPermalink "/about/" }}active{{ end }}">About</a>
    <a href="/manufacturing-unit/" class="{{ if eq .RelPermalink "/manufacturing-unit/" }}active{{ end }}">Manufacturing</a>
    <a href="/products/categories/" class="{{ if eq .RelPermalink "/products/categories/" }}active{{ end }}">Categories</a>
    <a href="/products/" class="{{ if and (or (eq .Section "products") (eq .Section "product")) (ne .RelPermalink "/products/categories/") }}active{{ end }}">Product Range</a>
    <a href="/contact/" class="{{ if eq .RelPermalink "/contact/" }}active{{ end }}">Contact Us</a>
    <a href="/articles/" class="{{ if or (eq .RelPermalink "/articles/") (eq .Section "articles") }}active{{ end }}">Articles</a>
    <a href="#" data-enquire-trigger>Enquire Now</a>
  </nav>
</header>
