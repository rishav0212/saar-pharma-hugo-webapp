{{- $url := .Permalink -}}
{{- $title := .Params.meta_title | default .Title -}}
{{- $description := .Params.meta_description | default .Description -}}
{{- $categories := where (where .Site.Pages "Params.layout" "category") "Section" "products" -}}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "CollectionPage",
      "@id": "{{ $url }}#collection",
      "url": "{{ $url }}",
      "name": "{{ $title }}",
      "description": "{{ $description }}",
      "isPartOf": { "@id": "{{ .Site.BaseURL }}#website" },
      "mainEntity": {
        "@type": "ItemList",
        "name": "Pharmaceutical Manufacturing Categories — Saar Biotech",
        "numberOfItems": {{ len $categories }},
        "itemListElement": [
          {{ range $index, $cat := $categories }}
          {
            "@type": "ListItem",
            "position": {{ add $index 1 }},
            "name": "{{ $cat.Title }} Manufacturing",
            "url": "{{ $cat.Permalink }}",
            "description": "{{ $cat.Params.description | default $cat.Description | plainify | truncate 120 }}"
          }{{ if lt (add $index 1) (len $categories) }},{{ end }}
          {{ end }}
        ]
      }
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{ $url }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ .Site.BaseURL }}"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Products",
          "item": "{{ absURL "/products/" }}"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Dosage Form & Therapeutic Categories",
          "item": "{{ $url }}"
        }
      ]
    },
    {
      "@type": "Service",
      "@id": "{{ $url }}#service",
      "name": "Pharmaceutical Contract Manufacturing — All Dosage Forms",
      "provider": {
        "@id": "{{ .Site.BaseURL }}#organization"
      },
      "areaServed": {
        "@type": "Country",
        "name": "India"
      },
      "description": "WHO-GMP and Schedule M certified pharmaceutical contract manufacturing in Baddi, Himachal Pradesh for all major dosage forms and therapeutic categories.",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Pharmaceutical Manufacturing Services",
        "itemListElement": [
          {{ range $index, $cat := $categories }}
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "{{ $cat.Title }} Contract Manufacturing",
              "url": "{{ $cat.Permalink }}"
            }
          }{{ if lt (add $index 1) (len $categories) }},{{ end }}
          {{ end }}
        ]
      }
    }
    {{ if .Params.faqs }}
    ,{
      "@type": "FAQPage",
      "mainEntity": [
        {{ range $index, $faq := .Params.faqs }}
        {
          "@type": "Question",
          "name": "{{ $faq.q }}",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "{{ $faq.a | plainify }}"
          }
        }{{ if lt (add $index 1) (len $.Params.faqs) }},{{ end }}
        {{ end }}
      ]
    }
    {{ end }}
  ]
}
</script>
