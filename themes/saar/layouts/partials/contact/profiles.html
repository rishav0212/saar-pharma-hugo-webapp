<section class="section border-t border-line" id="profiles">
  <div class="container">
    <div class="text-center max-w-2xl mx-auto mb-16" data-animate="fade-up">
      <span class="eyebrow">Digital Footprint</span>
      <h2 class="section-title">Ecosystem & Marketplace Platforms</h2>
      <p class="section-kicker">Connect with our leadership team on LinkedIn or browse our verified catalog on IndiaMART.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      {{ range .Params.profiles }}
      <a href="{{ .href }}" target="_blank" rel="noopener noreferrer" class="profile-card group bg-white p-8 rounded-2xl shadow-soft border border-line hover:shadow-lift transition-all duration-500" data-animate="fade-up">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-white transition-all duration-500 group-hover:scale-110 group-hover:rotate-3 shadow-lg" style="background-color: {{ .color }};">
            <i data-lucide="{{ .icon }}" class="w-8 h-8"></i>
          </div>
          <div>
            <h3 class="font-display font-bold text-xl text-ink leading-none mb-1.5">{{ .label }}</h3>
            <p class="text-sm text-muted">{{ .handle }}</p>
          </div>
        </div>
        <p class="text-muted text-sm leading-relaxed mb-6">{{ .desc }}</p>
        <div class="flex items-center gap-2 text-sm font-bold text-ink group-hover:text-brand transition-colors">
          Visit Profile <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
