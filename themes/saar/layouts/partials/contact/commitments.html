{{- /*
  CONTACT COMMITMENTS STRIP
  4 trust-signal cards showing response promise, confidentiality, etc.
*/ -}}
<section class="section bg-surface section-rail" aria-labelledby="commitments-title">
  <div class="container">

    <div class="section-head--center mb-12" data-animate="fade-up">
      <span class="eyebrow">Our Promise</span>
      <h2 id="commitments-title" class="section-title section-title--sm">
        What to Expect When You Reach Out
      </h2>
    </div>

    <div class="contact-commitments__grid" data-animate-stagger>
      {{ range .Params.commitments }}
      <div class="contact-commitment-card">
        <div class="contact-commitment-card__icon">
          <i data-lucide="{{ .icon }}" aria-hidden="true"></i>
        </div>
        <h3 class="contact-commitment-card__title">{{ .title }}</h3>
        <p class="contact-commitment-card__desc">{{ .desc }}</p>
      </div>
      {{ end }}
    </div>

  </div>
</section>
