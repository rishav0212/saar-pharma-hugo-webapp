<!-- Certifications Grid: Credibility Showcase -->
<section id="certifications-accreditations" class="section section--paper">
  <div class="container">
    <div class="section-head--center mb-16">
      <span class="eyebrow">Accreditations</span>
      <h2 class="section-title">Certified Global Standards</h2>
    </div>
    <div class="grid grid-cols-6 gap-6 max-lg:grid-cols-3 max-md:grid-cols-2" data-animate data-animate-stagger>
      <div class="p-6 bg-white border border-line rounded-xl text-center shadow-soft hover:shadow-lift transition-all" id="cert-who-gmp">
        <i data-lucide="award" class="w-10 h-10 text-brand mx-auto mb-4"></i>
        <h4 class="text-xs font-bold uppercase tracking-widest text-ink">WHO-GMP</h4>
      </div>
      <div class="p-6 bg-white border border-line rounded-xl text-center shadow-soft hover:shadow-lift transition-all" id="cert-iso-9001">
        <i data-lucide="shield-check" class="w-10 h-10 text-brand mx-auto mb-4"></i>
        <h4 class="text-xs font-bold uppercase tracking-widest text-ink">ISO 9001:2015</h4>
      </div>
      <div class="p-6 bg-white border border-line rounded-xl text-center shadow-soft hover:shadow-lift transition-all" id="cert-glp">
        <i data-lucide="flask-conical" class="w-10 h-10 text-brand mx-auto mb-4"></i>
        <h4 class="text-xs font-bold uppercase tracking-widest text-ink">GLP Certified</h4>
      </div>
      <div class="p-6 bg-white border border-line rounded-xl text-center shadow-soft hover:shadow-lift transition-all" id="cert-dcgi">
        <i data-lucide="file-check" class="w-10 h-10 text-brand mx-auto mb-4"></i>
        <h4 class="text-xs font-bold uppercase tracking-widest text-ink">DCGI Approved</h4>
      </div>
      <div class="p-6 bg-white border border-line rounded-xl text-center shadow-soft hover:shadow-lift transition-all" id="cert-fssai">
        <i data-lucide="check-circle-2" class="w-10 h-10 text-brand mx-auto mb-4"></i>
        <h4 class="text-xs font-bold uppercase tracking-widest text-ink">FSSAI Licensed</h4>
      </div>
      <div class="p-6 bg-white border border-line rounded-xl text-center shadow-soft hover:shadow-lift transition-all" id="cert-schedule-m">
        <i data-lucide="box" class="w-10 h-10 text-brand mx-auto mb-4"></i>
        <h4 class="text-xs font-bold uppercase tracking-widest text-ink">Schedule M</h4>
      </div>
    </div>
  </div>
</section>
