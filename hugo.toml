# Saar Biotech Config
baseURL = 'https://saarbiotech.in/'
languageCode = 'en-us'
title = 'Saar Biotech | WHO-GMP Certified Third Party Pharma Manufacturer in India'
theme = 'saar'
relativeURLs = false
canonifyURLs = false
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Saar Biotech is a leading WHO-GMP & ISO certified third-party pharmaceutical manufacturer in Baddi, India. {years} years of expertise in specialized Nasal Sprays, Oral Liquids, Suspensions, and Topical Gels for {clients} pharma partners across India."
  keywords = ["third party pharma manufacturer Baddi", "WHO-GMP pharma company India", "contract manufacturing nasal sprays", "oral liquid manufacturer", "Saar Biotech manufacturing", "pharma exports India", "DCGI approved pharma products"]
  phone = "+91 9357690454"
  email = "quotation@saarbiotech.com"
  address = "SCO-165, Sector-38C, Chandigarh - 160038"
  address_corp = "SCO-165, Sector-38C, Chandigarh - 160038, India"
  address_plant = "Plot No. 125-126, EPIP, Phase-1, Baddi, Distt. Solan, H.P. - 173205"
  plant = "Baddi, District Solan, Himachal Pradesh"
  founded = "2005"
  clients = "2050+"
  client_count = 2050
  products = "240+"
  product_count = 240
  units = "4"
  form_endpoint = "#"
  google_analytics_id = ""
  noindex = true

  # Social Links
  social_facebook = "https://www.facebook.com/SaarBiotechP"
  social_linkedin = "https://linkedin.com/company/saarbiotech"
  social_instagram = "https://instagram.com/saarbiotech"
  social_twitter = "https://x.com/SaarBiotech"
  social_indiamart = "https://www.indiamart.com/saar-biotech/"
  social_google_business_corp = "https://share.google/bmkUorFOUKpM9KNrg"
  social_google_business_plant = "https://share.google/z8AGlMEb0Wzv2HUew"
  social_google_business = "https://share.google/bmkUorFOUKpM9KNrg" # Default to Corporate
  social_google_maps_plant = "https://share.google/z8AGlMEb0Wzv2HUew"

[taxonomies]
  category    = "categories"
  subCategory = "subCategories"

[permalinks]
  products      = "/product/:slug/"
  categories    = "/categories/:slug/"
  subCategories = "/sub-categories/:slug/"

[sitemap]
  changefreq = "weekly"
  priority   = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  # Auto-generate Table of Contents for article pages
  # startLevel: 2 = start from H2 (H1 is the page title)
  # endLevel: 4 = include up to H4
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4
    ordered    = false

# =====================================================================
# Related Content Configuration
# Automatically matches products based on shared attributes
# =====================================================================
[related]
  threshold = 50
  includeNewer = true
  toLower = true

  # 1. Exact molecule match (Highest Priority)
  [[related.indices]]
    name = "compositions"
    weight = 100

  # 2. Therapeutic area match (High Priority)
  [[related.indices]]
    name = "therapeutic_class"
    weight = 80

  # 3. Dosage Form match (Medium Priority)
  [[related.indices]]
    name = "dosage_form"
    weight = 60

  # 4. Category match (Medium Priority)
  [[related.indices]]
    name = "categories"
    weight = 50

  # 5. Drug Form match (Low Priority)
  [[related.indices]]
    name = "drug_form"
    weight = 30

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "static/images"
    target = "assets/images"
