baseURL       = 'https://saarbiotech.in/'
languageCode  = 'en-us'
title         = 'Saar Biotech - WHO-GMP Certified Pharma Contract Manufacturer'
theme         = 'saar'
relativeURLs  = false
canonifyURLs  = false
enableRobotsTXT = true

[params]
  description   = "WHO-GMP & ISO certified third-party pharmaceutical contract manufacturer in India. 2050+ clients, 240+ products. Baddi, Himachal Pradesh."
  phone         = "+91 9357690454"
  email         = "quotation@saarbiotech.com"
  address       = "SCO-165, Sector-38C, Chandigarh - 160038"
  plant         = "Baddi, District Solan, Himachal Pradesh"
  founded       = "2005"
  clients       = "2050+"
  client_count  = 2050
  products      = "240+"
  product_count = 240
  units         = "4"

[taxonomies]
