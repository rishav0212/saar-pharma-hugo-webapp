  subCategory = "subCategories"

[permalinks]
  products      = "/products/:slug/"
  categories    = "/categories/:slug/"
  subCategories = "/sub-categories/:slug/"

[sitemap]
  changefreq = "weekly"
  priority   = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
